name: TestPilot
options:
  bundleIdPrefix: com.workco
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  settings:
    base:
      SWIFT_VERSION: "5.9"
fileGroups:
  - project.yml
targets:
  TestPilotApp:
    type: application
    platform: macOS
    sources:
      - TestPilotApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workco.testpilot
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: TestPilotApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
    postBuildScripts:
      - name: Copy and chmod testpilot script
        inputFiles:
          - $(SRCROOT)/../testpilot
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/testpilot
        script: |
          set -euo pipefail
          SCRIPT_SRC="${SRCROOT}/../testpilot"
          if [ ! -f "$SCRIPT_SRC" ]; then
            echo "error: testpilot script not found at ${SCRIPT_SRC}" >&2
            exit 1
          fi
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/testpilot"
          mkdir -p "$(dirname "$DEST")"
          cp "$SCRIPT_SRC" "$DEST"
          chmod +x "$DEST"
  TestPilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TestPilotTests
    dependencies:
      - target: TestPilotApp
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
